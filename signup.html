<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="إنشاء حساب جديد في أكاديمية نيوترون — انضم إلى مجتمعنا التعليمي المتميز.">

  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:title" content="إنشاء حساب — Neutron Academy">
  <meta property="og:description" content="إنشاء حساب جديد في أكاديمية نيوترون — انضم إلى مجتمعنا التعليمي المتميز.">
  <meta property="og:image" content="https://neutron-nu.vercel.app/assets/images/logo.png">
  <meta property="og:url" content="https://neutron-nu.vercel.app">
  <meta property="og:type" content="website">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="إنشاء حساب — Neutron Academy">
  <meta name="twitter:description" content="إنشاء حساب جديد في أكاديمية نيوترون — انضم إلى مجتمعنا التعليمي المتميز.">
  <meta name="twitter:image" content="https://neutron-nu.vercel.app/assets/images/logo.png">

  <title>إنشاء حساب — Neutron Academy</title>

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">

  <!-- Style Sheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <!-- Background Animated Shapes -->
  <div class="auth-bg-shapes">
    <div class="shape shape-cyan"></div>
    <div class="shape shape-purple"></div>
    <div class="shape shape-pink"></div>
  </div>

  <!-- Go Home Link -->
  <a href="index.html" class="auth-home-link">
    <i class="fas fa-arrow-right"></i>
    <span>الرئيسية</span>
  </a>

  <div class="auth-container" style="max-width: 500px;">
    <div class="auth-card">
      <div class="auth-header">
        <img src="assets/images/logo.png" alt="Neutron Academy" class="auth-logo">
        <h2>حساب جديد</h2>
        <p>ابدأ رحلتك التعليمية مع نيوترون اليوم</p>
      </div>

      <form class="auth-form" action="#" method="POST">
        <!-- Full Name -->
        <div class="form-group">
          <label for="fullname">الاسم الكامل</label>
          <div class="input-wrapper">
            <input type="text" id="fullname" name="fullname" placeholder="أدخل اسمك بالكامل" required>
            <i class="fas fa-user"></i>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
            <i class="fas fa-envelope"></i>
          </div>
        </div>

        <!-- Grade Selection -->
        <div class="form-group">
          <label for="grade">المرحلة الدراسية</label>
          <div class="input-wrapper">
            <select id="grade" name="grade" required>
              <option value="" disabled selected>اختر مرحلتك الدراسية</option>
              <option value="6">الصف السادس الابتدائي</option>
              <option value="8">الصف الثاني الإعدادي</option>
              <option value="10">الصف الأول الثانوي</option>
            </select>
            <i class="fas fa-graduation-cap"></i>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="اختر كلمة مرور قوية" required>
            <i class="fas fa-lock"></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirm-password">تأكيد كلمة المرور</label>
          <div class="input-wrapper">
            <input type="password" id="confirm-password" name="confirm-password" placeholder="أعد إدخال كلمة المرور" required>
            <i class="fas fa-check-double"></i>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-auth">إنشاء الحساب</button>
      </form>

      <div class="auth-footer">
        لديك حساب بالفعل؟
        <a href="login.html">تسجيل الدخول</a>
      </div>
    </div>
  </div>

  <script>
    // Simple verification example
    const form = document.querySelector('.auth-form');
    form.addEventListener('submit', (e) => {
      const pass = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      
      if (pass !== confirm) {
        e.preventDefault();
        alert('كلمات المرور غير متطابقة!');
      }
    });
  </script>
</body>
</html>
